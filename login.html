<!doctype html>
<!-- InSiteful Mind by Addison Thurston, David Pan, Kysen Krishnaswamy, and Prabhnoor Singh -->
<!-- WIP: Make this actually work with the backend and database (stateless auth) -->
<html lang="en">

<head>
    <!-- Meta tags, title, and link to stylesheet -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InSiteful Mind</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="app.js"></script>
</head>

<body>
    <main class="container login-grid">
        <section class="login-logo">
            <p>InSiteful Mind</p>
        </section>
        <!-- signin with Google button -->
        <section class="login-card panel">
            <h1>Welcome!</h1>
            <p class="login-subtitle">Sign in with Google to continue.</p>
            <div id="g_id_onload"
                data-client_id="367361204794-1s7mqntr4fq14l0i8thpn7t7gb3gb08s.apps.googleusercontent.com"
                data-auto_prompt="false" data-callback="signinWithGoogle">
            </div>
            <div class="g_id_signin" data-shape="pill" data-width="320">
            </div>
            <script>
                // Decode the JWT payload from Google's credential response.
                // JWT uses base64url encoding, so we normalize it before atob().
                function decodeJwtPayload(jwt) {
                    const payloadPart = jwt.split('.')[1];
                    const base64 = payloadPart.replaceAll('-', '+').replaceAll('_', '/');
                    const padded = base64 + '='.repeat((4 - (base64.length % 4)) % 4);
                    return JSON.parse(atob(padded));
                }

                // Google Identity Services callback declared in data-callback.
                //globalThis instead of window to avoid conflicts with other scripts
                globalThis.signinWithGoogle = function (response) {
                    // check if the response is valid
                    if (!response || !response.credential) {
                        console.error('Google sign-in did not return a credential.');
                        return;
                    }

                    try {
                        const payload = decodeJwtPayload(response.credential);
                        // WIP (idk what to do to with this yet)
                        const user = {
                            email: payload.email,
                            name: payload.name,
                            picture: payload.picture,
                            sub: payload.sub,
                        };

                        // Store basic profile info and raw credential for next page usage.
                        // Note: this is client-side state only (no backend validation yet).
                        sessionStorage.setItem('user', JSON.stringify(user));
                        sessionStorage.setItem('credential', response.credential);

                        // Move the user into the app after successful sign-in.
                        globalThis.location.href = 'index.html';
                    } catch (error) {
                        console.error('Failed to parse Google credential payload.', error);
                    }
                };
            </script>
        </section>
    </main>
</body>

</html>
