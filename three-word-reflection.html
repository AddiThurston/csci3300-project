<!doctype html>
<!-- InSiteful Mind by Addison Thurston, David Pan, Kysen Krishnaswamy, and Prabhnoor Singh -->
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InSiteful Mind - Three-Word Reflection</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <header class="top-bar">
        <div class="insite-logo"> InSiteful Mind </div>
        <nav class="wrap row">
            <a href="journal.html">
                <button class="main-button"> Journal </button>
            </a>
            <a href="check-in.html">
                <button class="main-button"> Check-In </button>
            </a>
            <a href="three-word-reflection.html">
                <button class="main-button"> Three-Word </button>
            </a>
            <a href="trends.html">
                <button class="main-button"> Trends </button>
            </a>
        </nav>
    </header>
    <main class="container mood-page">
        <section class="mood-slider-block panel">
            <div class="mood-slider-header">
                <span class="mood-slider-label">Current Mood</span>
                <span class="mood-current-value" id="mood-value">Okay</span>
            </div>
            <input
                class="mood-slider"
                id="mood-slider"
                type="range"
                min="1"
                max="7"
                step="1"
                value="4"
                aria-label="Mood from abysmal to exceptional"
            />
            <div class="mood-scale-labels" aria-hidden="true">
                <span>Abysmal</span>
                <span>Rough</span>
                <span>Low</span>
                <span>Okay</span>
                <span>Good</span>
                <span>Great</span>
                <span>Exceptional</span>
            </div>
        </section>
    </main>

    <script>
        const moodLevels = [
            "Abysmal",
            "Rough",
            "Low",
            "Okay",
            "Good",
            "Great",
            "Exceptional",
        ];
        const moodColors = [
            "#ff5f7a",
            "#ff7f66",
            "#ffad5b",
            "#ffd166",
            "#9ce36e",
            "#5bd6b7",
            "#67f0ff",
        ];

        const moodPage = document.querySelector(".mood-page");
        const moodSlider = document.getElementById("mood-slider");
        const moodValue = document.getElementById("mood-value");

        function updateMoodLabel() {
            const index = Number(moodSlider.value) - 1;
            moodValue.textContent = moodLevels[index];
            moodPage.style.setProperty("--mood-accent", moodColors[index]);
        }

        moodSlider.addEventListener("input", updateMoodLabel);
        updateMoodLabel();
        setActiveCategory(sliderCategory(50));
        renderSelected();
    </script>
    <script>
        const QUESTIONS = [
            { id: "mood",             label: "How would you rate your overall mood today?" },
            { id: "sleep",            label: "How well have you been sleeping?" },
            { id: "energy",           label: "How is your energy level?" },
            { id: "calm",             label: "How calm and relaxed do you feel?" },
            { id: "connection",       label: "How connected do you feel to others?" },
            { id: "motivation",       label: "How motivated do you feel?" },
            { id: "focus",            label: "How well are you able to focus?" },
            { id: "responsibilities", label: "How well are you managing your daily responsibilities?" },
            { id: "hope",             label: "How hopeful do you feel about the future?" },
            { id: "anxiety_free",     label: "How free from worry or anxiety do you feel?" },
            { id: "progress",         label: "How satisfied are you with your recent progress?" },
            { id: "physical",         label: "How well are you taking care of your physical health?" },
            { id: "grounded",         label: "How present and grounded do you feel?" },
        ];
        const SCALE_LABELS = { 1: "Very Low", 2: "Low", 3: "Moderate", 4: "Good", 5: "Great" };
        let qResponses = {};
        function renderQuestionnaire() {
            qResponses = {};
            const list = document.getElementById("q-questions-list");
            list.innerHTML = QUESTIONS.map((q, i) => `
                <div style="margin-bottom:24px;">
                    <p style="margin:0 0 10px;font-size:14px;font-weight:600;color:var(--text);">${i + 1}. ${q.label}</p>
                    <div style="display:flex;gap:8px;">
                        ${[1,2,3,4,5].map(n => `<button id="q-btn-${q.id}-${n}" onclick="selectResponse('${q.id}', ${n})" style="flex:1;padding:10px 0;border-radius:10px;border:1.5px solid var(--line);background:var(--control-bg-soft);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;" onmouseover="if(!this.dataset.selected)this.style.borderColor='var(--primary)'" onmouseout="if(!this.dataset.selected)this.style.borderColor='var(--line)'">${n}<br><span style="font-size:10px;font-weight:400;">${SCALE_LABELS[n]}</span></button>`).join("")}
                    </div>
                </div>
            `).join("");
        }
        function selectResponse(qid, val) {
            qResponses[qid] = val;
            [1,2,3,4,5].forEach(n => {
                const btn = document.getElementById(`q-btn-${qid}-${n}`);
                if (n === val) { btn.style.background="linear-gradient(135deg,var(--primary),var(--primary-dark))"; btn.style.borderColor="var(--primary)"; btn.style.color="#fff"; btn.dataset.selected="1"; }
                else { btn.style.background="var(--control-bg-soft)"; btn.style.borderColor="var(--line)"; btn.style.color="var(--muted)"; delete btn.dataset.selected; }
            });
            document.getElementById("q-error").style.display="none";
        }
        function openQuestionnaire() {
            renderQuestionnaire();
            document.getElementById("q-error").style.display="none";
            const o = document.getElementById("questionnaire-overlay");
            o.style.display="flex"; o.scrollTop=0;
        }
        function dismissQuestionnaire() { document.getElementById("questionnaire-overlay").style.display="none"; }
        async function submitQuestionnaire() {
            if (QUESTIONS.some(q => !(q.id in qResponses))) { document.getElementById("q-error").style.display="block"; return; }
            try { await fetch("/api/questionnaire", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({responses:qResponses}) }); } catch {}
            dismissQuestionnaire();
        }
    </script>
</body>

</html>
