<!doctype html>
<!-- InSiteful Mind by Addison Thurston, David Pan, Kysen Krishnaswamy, and Prabhnoor Singh -->
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InSiteful Mind - Three-Word Reflection</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="username-overlay" id="username-overlay">
        <div class="username-card panel">
            <h2>Welcome</h2>
            <p>Enter a username to access your check-in.</p>
            <input type="text" id="username-input" placeholder="Username" />
            <button class="main-button full-width" onclick="setUsername()">Continue</button>
        </div>
    </div>

    <header class="top-bar">
        <div class="insite-logo"> InSiteful Mind </div>
        <nav class="wrap row">
            <a href="journal.html"><button class="main-button"> Journal </button></a>
            <a href="check-in.html"><button class="main-button"> Check-In </button></a>
            <a href="three-word-reflection.html"><button class="main-button"> Three-Word </button></a>
            <a href="trends.html"><button class="main-button"> Trends </button></a>
        </nav>
    </header>

    <main class="container container-top mood-page">
        <! While it works, I think it would be better for this to be a section instead of a div since it is a distinct part of the page>
        <div class="checkin-wrapper">
            <section class="mood-slider-block panel">
                <div class="mood-slider-header">
                    <span class="mood-slider-label">Current Mood</span>
                </div>
                <div class="mood-scale-wrap">
                    <span class="mood-current-value mood-indicator" id="mood-value">Okay</span>
                    <input
                        class="mood-slider"
                        id="mood-slider"
                        type="range"
                        min="0"
                        max="100"
                        step="1"
                        value="50"
                        aria-label="Mood from abysmal to exceptional"
                    />
                    <div class="mood-scale-labels" aria-hidden="true">
                        <span>Abysmal</span>
                        <span>Rough</span>
                        <span>Low</span>
                        <span>Okay</span>
                        <span>Good</span>
                        <span>Great</span>
                        <span>Exceptional</span>
                    </div>
                </div>
            </section>

            <section class="words-card panel">
                <h2>Choose Up to 3 Words</h2>

                <div class="word-grid" id="word-grid"></div>
            </section>

            <section class="selected-display panel">
                <h3>Your Words</h3>
                <div class="selected-pills" id="selected-pills">
                    <span class="slot-empty">No words selected yet</span>
                </div>
                <p class="slot-counter" id="slot-counter">0 / 3 selected</p>
            </section>

            <div class="submit-row">
                <button class="main-button" id="submit-btn" onclick="submitCheckin()" disabled>
                    Save Reflection
                </button>
                <button class="skip-link" id="view-history-btn" type="button" onclick="viewPastEntries()">
                    View Past Entries
                </button>
            </div>

            <section class="history-card panel" id="history-card">
                <div class="history-header">
                    <h3>Previous Reflections</h3>
                    <p id="history-meta"></p>
                </div>
                <div id="history-list"></div>
            </section>
        </div>
    </main>

    <script type="module">
        import {
            setActiveCategory,
            renderSelected,
            selectedWords,
        } from "./word-system.js";
        import { getEncryptionKey, encryptText, decryptText } from './encryption.js';

        let encryptionKey = null;
        async function initEncryption() {
            encryptionKey = await getEncryptionKey();
        }

        const moodLevels = [
            "Abysmal",
            "Rough",
            "Low",
            "Okay",
            "Good",
            "Great",
            "Exceptional",
        ];
        const moodColors = [
            "#ff5f7a",
            "#ff7f66",
            "#ffad5b",
            "#ffd166",
            "#9ce36e",
            "#5bd6b7",
            "#67f0ff",
        ];

        function getSessionUser() {
            try {
                return JSON.parse(sessionStorage.getItem("user") || "null");
            } catch {
                return null;
            }
        }

        function deriveUsernameFromUser(user) {
            if (!user || typeof user !== "object") return "";
            return (user.email || user.name || user.sub || "").toString().trim();
        }

        let currentUsername = deriveUsernameFromUser(getSessionUser()) || localStorage.getItem("username");

        if (currentUsername) {
            initEncryption();
        }

        const moodPage = document.querySelector(".mood-page");
        const moodSlider = document.getElementById("mood-slider");
        const moodValue = document.getElementById("mood-value");
        const moodScaleLabels = Array.from(document.querySelectorAll(".mood-scale-labels span"));
        const usernameOverlay = document.getElementById("username-overlay");
        const usernameInput = document.getElementById("username-input");
        const historyCard = document.getElementById("history-card");
        const historyList = document.getElementById("history-list");
        const historyMeta = document.getElementById("history-meta");
        const historyBtn = document.getElementById("view-history-btn");
        let historyVisible = false;

        if (currentUsername) {
            usernameOverlay.style.display = "none";
        }

        usernameInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") setUsername();
        });

        async function setUsername() {
            const val = usernameInput.value.trim();
            if (!val) return;
            currentUsername = val;
            localStorage.setItem("username", val);
            usernameOverlay.style.display = "none";
            await initEncryption();
        }

        // kysen code review: authHeaders builds the header object AND reads/parses the session user.
        // getSessionUser() is already extracted — consider keeping authHeaders() a pure
        // header assembler and passing the user in as a parameter instead.
        function authHeaders() {
            const headers = {
                "Content-Type": "application/json",
                "X-Username": currentUsername || "",
            };

            const sessionUser = getSessionUser();
            if (sessionUser) {
                headers["X-User-Info"] = JSON.stringify(sessionUser);
            }
            return headers;
        }

        function escapeHtml(value) {
            return String(value)
                .replaceAll("&", "&amp;")
                .replaceAll("<", "&lt;")
                .replaceAll(">", "&gt;")
                .replaceAll('"', "&quot;")
                .replaceAll("'", "&#39;");
        }

        function formatDate(msTimestamp) {
            const date = new Date(msTimestamp);
            if (Number.isNaN(date.getTime())) return "Unknown date";
            return date.toLocaleString();
        }

        function hexToRgb(hex) {
            const normalized = hex.replace("#", "");
            const intVal = Number.parseInt(normalized, 16);
            return {
                r: (intVal >> 16) & 255,
                g: (intVal >> 8) & 255,
                b: intVal & 255,
            };
        }

        function interpolateColor(startHex, endHex, factor) {
            const start = hexToRgb(startHex);
            const end = hexToRgb(endHex);
            const r = Math.round(start.r + (end.r - start.r) * factor);
            const g = Math.round(start.g + (end.g - start.g) * factor);
            const b = Math.round(start.b + (end.b - start.b) * factor);
            return `rgb(${r}, ${g}, ${b})`;
        }

        function moodIndexFromScore(score) {
            return Math.max(0, Math.min(moodLevels.length - 1, Math.round((score / 100) * (moodLevels.length - 1))));
        }

        function moodAccentFromScore(score) {
            const clamped = Math.max(0, Math.min(100, score));
            const scaled = (clamped / 100) * (moodColors.length - 1);
            const lower = Math.floor(scaled);
            const upper = Math.ceil(scaled);
            if (lower === upper) {
                return moodColors[lower];
            }
            return interpolateColor(moodColors[lower], moodColors[upper], scaled - lower);
        }

        // kysen code review: updateMoodLabel updates the label text, sets a CSS variable, AND repositions
        // the label element. Each of those is a separate concern — consider splittin into
        // updateMoodText(score) and updateMoodLabelPosition(score).
        function updateMoodLabel() {
            const score = Number(moodSlider.value);

            // Update label text (you already had this)
            const index = moodIndexFromScore(score);
            moodValue.textContent = moodLevels[index];

            moodPage.style.setProperty("--mood-accent", moodAccentFromScore(score));

            const min = Number(moodSlider.min) || 0;
            const max = Number(moodSlider.max) || 100;
            const percent = (score - min) / (max - min);

            const sliderWidth = moodSlider.offsetWidth;

            const thumbWidth = 22;

            const offset = percent * (sliderWidth - thumbWidth) + thumbWidth / 2;

            moodValue.style.left = `${offset}px`;
        }

        globalThis.toggleWord = toggleWord;

        function hideSelectionMenu() {
            document
                .querySelectorAll(".mood-slider-block, .words-card, .selected-display, .submit-row")
                .forEach((el) => {
                    el.style.display = "none";
                });
        }

        // kysen code review: submitCheckin manages button UI state, builds the payload, makes the API call,
        // and calls showSuccess. Consider extracting buildCheckinPayload() and letting
        // submitCheckin focus only on the fetch + error handling.
        async function submitCheckin() {
            if (selectedWords.length === 0) return;
            const btn = document.getElementById("submit-btn");
            btn.disabled = true;
            btn.textContent = "Saving...";

            const moodScore = Number(moodSlider.value);
            const moodIndex = moodIndexFromScore(moodScore);

            // Encrypt the words and mood label before sending to the server
            const wordsToSend = encryptionKey
                ? await encryptText(encryptionKey, JSON.stringify(selectedWords))
                : selectedWords;
            const moodLabelToSend = encryptionKey
                ? await encryptText(encryptionKey, moodLevels[moodIndex])
                : moodLevels[moodIndex];

            const payload = {
                words: wordsToSend,
                moodScore,
                moodLabel: moodLabelToSend,
            };

            try {
                const response = await fetch("/api/checkin", {
                    method: "POST",
                    headers: authHeaders(),
                    body: JSON.stringify(payload),
                });
                if (!response.ok) throw new Error("Failed to save reflection");
                hideSelectionMenu();
                await viewPastEntries({ forceOpen: true });
                historyCard.scrollIntoView({ behavior: "smooth", block: "start" });
            } catch {
                btn.disabled = false;
                btn.textContent = "Save Reflection";
                alert("Could not save reflection right now. Please try again.");
            }
        }
        globalThis.submitCheckin = submitCheckin;

        async function viewPastEntries(options = {}) {
            const forceOpen = Boolean(options.forceOpen);

            if (historyVisible && !forceOpen) {
                historyCard.style.display = "none";
                historyBtn.textContent = "View Past Entries";
                historyVisible = false;
                return;
            }

            if (!currentUsername) {
                alert("Please enter a username first.");
                usernameOverlay.style.display = "flex";
                return;
            }

            historyCard.style.display = "block";
            historyList.innerHTML = `<p class="history-status">Loading past entries...</p>`;
            historyMeta.textContent = "";
            historyBtn.disabled = true;

            try {
                const res = await fetch("/api/checkin?limit=10", {
                    method: "GET",
                    headers: authHeaders(),
                });
                if (!res.ok) throw new Error("Failed to load history");
                const data = await res.json();
                const entries = Array.isArray(data.entries) ? data.entries : [];
                const total = Number(data.total) || 0;
                const hasMore = Boolean(data.hasMore);

                historyMeta.textContent = `${entries.length} shown of ${total} total`;
                if (entries.length) {
                    // Decrypt each entry before rendering
                    const decrypted = await Promise.all(entries.map(async (entry) => {
                        let moodLabel = entry.moodLabel || "Mood";
                        let words = Array.isArray(entry.words) ? entry.words : [];

                        if (encryptionKey) {
                            if (typeof entry.moodLabel === "string" && entry.moodLabel.startsWith("enc:")) {
                                moodLabel = await decryptText(encryptionKey, entry.moodLabel);
                            }
                            if (typeof entry.words === "string" && entry.words.startsWith("enc:")) {
                                try { words = JSON.parse(await decryptText(encryptionKey, entry.words)); }
                                catch { words = []; }
                            }
                        }

                        return { ...entry, moodLabel, words };
                    }));

                    historyList.innerHTML = decrypted.map((entry) => {
                        const wordPills = entry.words.map((word) =>
                            `<span class="success-word-pill">${escapeHtml(word)}</span>`
                        ).join("");
                        return `
                            <article class="history-item">
                                <div class="history-row">
                                    <strong>${escapeHtml(entry.moodLabel)}</strong>
                                    <span class="history-date">${escapeHtml(formatDate(entry.timestamp))}</span>
                                </div>
                                <div class="success-words">${wordPills}</div>
                            </article>
                        `;
                    }).join("");
                } else {
                    historyList.innerHTML = `<p class="history-status">No past entries yet.</p>`;
                }

                if (hasMore) {
                    historyList.insertAdjacentHTML(
                        "beforeend",
                        `<p class="history-status">Showing most recent 10 entries.</p>`
                    );
                }
                historyBtn.textContent = "Hide Past Entries";
                historyVisible = true;
            } catch {
                historyList.innerHTML = `<p class="history-status">Could not load past entries right now.</p>`;
            } finally {
                historyBtn.disabled = false;
            }
        }
        globalThis.viewPastEntries = viewPastEntries;

        function sliderCategory(val) {
            // 7 levels — Abysmal/Rough/Low → negative, Okay → neutral, Good/Great/Exceptional → positive
            if (val <= 45) return 'negative';
            if (val <= 54) return 'neutral';
            return 'positive';
        }

        moodSlider.addEventListener("input", () => {
            updateMoodLabel();
            setActiveCategory(sliderCategory(Number(moodSlider.value)));
        });
        updateMoodLabel();
        setActiveCategory(sliderCategory(50));
        renderSelected();
    </script>
</body>

</html>
