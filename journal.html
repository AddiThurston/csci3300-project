<!doctype html>
<!-- InSiteful Mind by Addison Thurston, David Pan, Kysen Krishnaswamy, and Prabhnoor Singh -->
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InSiteful Mind</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <!-- Check-in questionnaire modal -->
    <div class="username-overlay" id="questionnaire-overlay" style="display:none;z-index:200;align-items:flex-start;padding:24px 0;overflow-y:auto;">
        <div class="panel" style="width:min(520px,94vw);padding:32px 28px;text-align:left;margin:auto;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
                <h2 style="margin:0;font-size:20px;">Check-In</h2>
                <button onclick="window.dismissQuestionnaire()" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:0 0 0 12px;" title="Close">&times;</button>
            </div>
            <p style="margin:0 0 28px;color:var(--muted);font-size:14px;">Rate each area from 1 (very low) to 5 (great).</p>
            <div id="q-questions-list"></div>
            <p id="q-error" style="display:none;color:var(--danger);font-size:13px;margin:0 0 16px;">Please answer all questions before saving.</p>
            <button class="main-button full-width" onclick="window.submitQuestionnaire()">Save Check-In</button>
        </div>
    </div>

    <!-- Username prompt -->
    <div class="username-overlay" id="username-overlay">
        <div class="username-card panel">
            <h2>Welcome</h2>
            <p>Enter a username to access your journal.</p>
            <input type="text" id="username-input" placeholder="Username" />
            <button class="main-button full-width" onclick="setUsername()">Continue</button>
        </div>
    </div>

    <header class="top-bar">
        <div class="insite-logo"> InSiteful Mind </div>
        <nav class="wrap row">
            <a href="journal.html">
                <button class="main-button"> Journal </button>
            </a>
            <button class="main-button" onclick="window.openQuestionnaire()"> Check-In </button>
            <a href="three-word-reflection.html">
                <button class="main-button"> Three-Word </button>
            </a>
            <a href="trends.html">
                <button class="main-button"> Trends </button>
            </a>
        </nav>
    </header>

    <main class="container container-top">
        <div class="journal-layout">
            <!-- New Entry Form -->
            <div class="entry-form panel">
                <h2>New Entry</h2>
                <input type="text" id="entry-title" placeholder="Title (optional)" />
                <textarea id="entry-content" placeholder="What's on your mind?"></textarea>
                <button class="main-button full-width" id="save-btn" onclick="saveEntry()">Save Entry</button>
            </div>

            <!-- Past Entries -->
            <div class="entries-panel panel">
                <h2>Past Entries</h2>
                <div class="search-bar-row">
                    <input type="text" id="search-input" placeholder="Search by keyword..." oninput="filterEntries()" />
                    <div class="date-filter-row">
                        <input type="date" id="date-from" onchange="filterEntries()" title="From date" />
                        <span class="date-sep">—</span>
                        <input type="date" id="date-to" onchange="filterEntries()" title="To date" />
                    </div>
                </div>
                <div class="entries-list" id="entries-list">
                    <p class="empty-state">Loading entries...</p>
                </div>
            </div>
        </div>
    </main>

    

    <script type="module">
        import { getEncryptionKey, encryptText, decryptText } from './encryption.js';

        let currentUsername = localStorage.getItem('username');
        let encryptionKey = null;

        // Derives the encryption key from the user's Google account ID (or username).
        // Must be called before saving or loading entries.
        async function initEncryption() {
            encryptionKey = await getEncryptionKey();
        }

        // Show or hide the username prompt
        if (currentUsername) {
            document.getElementById('username-overlay').style.display = 'none';
            initEncryption().then(() => loadEntries());
        }

        // Press Enter to submit username
        document.getElementById('username-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') setUsername();
        });

        async function setUsername() {
            const val = document.getElementById('username-input').value.trim();
            if (!val) return;
            currentUsername = val;
            localStorage.setItem('username', val);
            document.getElementById('username-overlay').style.display = 'none';
            await initEncryption();
            loadEntries();
        }

        function authHeaders() {
            return {
                'Content-Type': 'application/json',
                'X-Username': currentUsername,
            };
        }

        function formatDate(timestamp) {
            return new Date(timestamp).toLocaleDateString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: '2-digit', minute: '2-digit',
            });
        }

        // The escapeHTML() seems to be missing replacements for double/single quotaion mark. Consider using .replaceAll()
        // instead of .replace() to make it easier to read. You can easily add new characters as well.
        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        let allEntries = [];

        // kysen code review: filterEntries handles keyword filtering, from-date filtering, and to-date filtering
        // all in one function. Consider extracting applyKeywordFilter(), applyDateRangeFilter().
        function filterEntries() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            const fromVal = document.getElementById('date-from').value;
            const toVal = document.getElementById('date-to').value;

            let filtered = allEntries;

            if (query) {
                filtered = filtered.filter(e =>
                    e.title.toLowerCase().includes(query) ||
                    e.content.toLowerCase().includes(query)
                );
            }
            if (fromVal) {
                const from = new Date(fromVal).getTime();
                filtered = filtered.filter(e => e.timestamp >= from);
            }
            if (toVal) {
                const to = new Date(toVal + 'T23:59:59').getTime();
                filtered = filtered.filter(e => e.timestamp <= to);
            }

            renderEntries(filtered, query);
        }

        function highlightText(str, query) {
            if (!query) return escapeHtml(str);
            const escaped = escapeHtml(str);
            const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return escaped.replace(new RegExp(`(${escapedQuery})`, 'gi'), '<mark>$1</mark>');
        }

        function renderEntries(entries, query = '') {
            const list = document.getElementById('entries-list');
            if (allEntries.length === 0) {
                list.innerHTML = '<p class="empty-state">No entries yet. Write your first one!</p>';
                return;
            }
            if (entries.length === 0) {
                list.innerHTML = '<p class="empty-state">No entries match your search.</p>';
                return;
            }
            list.innerHTML = entries.map(entry => `
                <div class="entry-card" id="entry-${entry.id}">
                    <div class="entry-card-header">
                        <h3>${highlightText(entry.title, query)}</h3>
                        <div class="entry-meta">
                            <span class="entry-date">${formatDate(entry.timestamp)}</span>
                            <button class="delete-btn" onclick="deleteEntry('${entry.id}')" title="Delete">&#x2715;</button>
                        </div>
                    </div>
                    <p class="entry-content">${highlightText(entry.content, query)}</p>
                </div>
            `).join('');
        }

        async function loadEntries() {
            try {
                const res = await fetch('/api/entries', { headers: authHeaders() });
                const raw = await res.json();
                // Decrypt each entry's title and content before storing in memory
                allEntries = await Promise.all(raw.map(async entry => ({
                    ...entry,
                    title: encryptionKey ? await decryptText(encryptionKey, entry.title) : entry.title,
                    content: encryptionKey ? await decryptText(encryptionKey, entry.content) : entry.content,
                })));
                filterEntries();
            } catch {
                document.getElementById('entries-list').innerHTML =
                    '<p class="empty-state">Failed to load entries.</p>';
            }
        }

        // kysen code review: saveEntry manages button UI state, makes the API call, and clears the form.
        // These are three distinct responsibilities — consider extracting clearEntryForm() and
        // keeping saveEntry focused only on the API call.
        async function saveEntry() {
            const rawTitle = document.getElementById('entry-title').value.trim();
            const rawContent = document.getElementById('entry-content').value.trim();
            if (!rawContent) return;

            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                // Encrypt title and content in the browser before sending to the server
                const title = encryptionKey ? await encryptText(encryptionKey, rawTitle || 'Untitled') : rawTitle;
                const content = encryptionKey ? await encryptText(encryptionKey, rawContent) : rawContent;

                const res = await fetch('/api/entries', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({ title, content }),
                });
                if (res.ok) {
                    document.getElementById('entry-title').value = '';
                    document.getElementById('entry-content').value = '';
                    await loadEntries();
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save Entry';
            }
        }

        // The deleteEntry() does not seem to have error handling. If the fetch fails then the
        // entry can still be removed from allEntries and disappear from the UI. Users won't
        // know what happened or confirm that it was deleted.
        // Use try/catch to handle network failures and tell the user that it was not deleted.
        async function deleteEntry(id) {
            await fetch(`/api/entries/${id}`, { method: 'DELETE', headers: authHeaders() });
            allEntries = allEntries.filter(e => e.id !== id);
            filterEntries();
        }

        // ── Questionnaire ──────────────────────────────────────────────────
        const QUESTIONS = [
            { id: 'mood',             label: 'How would you rate your overall mood today?' },
            { id: 'sleep',            label: 'How well have you been sleeping?' },
            { id: 'energy',           label: 'How is your energy level?' },
            { id: 'calm',             label: 'How calm and relaxed do you feel?' },
            { id: 'connection',       label: 'How connected do you feel to others?' },
            { id: 'motivation',       label: 'How motivated do you feel?' },
            { id: 'focus',            label: 'How well are you able to focus?' },
            { id: 'responsibilities', label: 'How well are you managing your daily responsibilities?' },
            { id: 'hope',             label: 'How hopeful do you feel about the future?' },
            { id: 'anxiety_free',     label: 'How free from worry or anxiety do you feel?' },
            { id: 'progress',         label: 'How satisfied are you with your recent progress?' },
            { id: 'physical',         label: 'How well are you taking care of your physical health?' },
            { id: 'grounded',         label: 'How present and grounded do you feel?' },
        ];

        const SCALE_LABELS = { 1: 'Very Low', 2: 'Low', 3: 'Moderate', 4: 'Good', 5: 'Great' };

        let qResponses = {};

        function renderQuestionnaire() {
            qResponses = {};
            const list = document.getElementById('q-questions-list');
            list.innerHTML = QUESTIONS.map((q, i) => `
                <div style="margin-bottom:24px;">
                    <p style="margin:0 0 10px;font-size:14px;font-weight:600;color:var(--text);">
                        ${i + 1}. ${q.label}
                    </p>
                    <div style="display:flex;gap:8px;">
                        ${[1,2,3,4,5].map(n => `
                            <button
                                id="q-btn-${q.id}-${n}"
                                onclick="window.selectResponse('${q.id}', ${n})"
                                style="flex:1;padding:10px 0;border-radius:10px;border:1.5px solid var(--line);
                                       background:rgba(8,14,31,.45);color:var(--muted);font-size:13px;
                                       font-weight:600;cursor:pointer;transition:all .15s;"
                                onmouseover="if(!this.dataset.selected)this.style.borderColor='var(--primary)'"
                                onmouseout="if(!this.dataset.selected)this.style.borderColor='var(--line)'"
                            >${n}<br><span style="font-size:10px;font-weight:400;">${SCALE_LABELS[n]}</span></button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function selectResponse(questionId, value) {
            qResponses[questionId] = value;
            [1,2,3,4,5].forEach(n => {
                const btn = document.getElementById(`q-btn-${questionId}-${n}`);
                if (n === value) {
                    btn.style.background = 'linear-gradient(135deg,var(--primary),var(--primary-dark))';
                    btn.style.borderColor = 'var(--primary)';
                    btn.style.color = '#fff';
                    btn.dataset.selected = '1';
                } else {
                    btn.style.background = 'rgba(8,14,31,.45)';
                    btn.style.borderColor = 'var(--line)';
                    btn.style.color = 'var(--muted)';
                    delete btn.dataset.selected;
                }
            });
            document.getElementById('q-error').style.display = 'none';
        }

        function openQuestionnaire() {
            renderQuestionnaire();
            document.getElementById('q-error').style.display = 'none';
            const overlay = document.getElementById('questionnaire-overlay');
            overlay.style.display = 'flex';
            overlay.scrollTop = 0;
        }

        function dismissQuestionnaire() {
            document.getElementById('questionnaire-overlay').style.display = 'none';
        }

        async function submitQuestionnaire() {
            const unanswered = QUESTIONS.filter(q => !(q.id in qResponses));
            if (unanswered.length > 0) {
                document.getElementById('q-error').style.display = 'block';
                return;
            }
            try {
                await fetch('/api/questionnaire', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({ responses: qResponses }),
                });
            } catch {
                // silently fail — don't block the user
            }
            dismissQuestionnaire();
        }

        // Module functions are not global, so expose the ones used by onclick attributes in HTML
        window.setUsername = setUsername;
        window.saveEntry = saveEntry;
        window.deleteEntry = deleteEntry;
        window.filterEntries = filterEntries;
        window.openQuestionnaire = openQuestionnaire;
        window.dismissQuestionnaire = dismissQuestionnaire;
        window.submitQuestionnaire = submitQuestionnaire;
        window.selectResponse = selectResponse;
    </script>
</body>

</html>
