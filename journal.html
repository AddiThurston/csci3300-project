<!doctype html>
<!-- InSiteful Mind by Addison Thurston, David Pan, Kysen Krishnaswamy, and Prabhnoor Singh -->
<html lang="en">

<head>
    <!-- Meta tags, title, and link to stylesheet -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InSiteful Mind - Journal</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <!-- Username prompt overlay if the user is not logged in -->
    <div class="username-overlay" id="username-overlay">
        <div class="username-card panel">
            <h2>Welcome</h2>
            <p>Enter a username to access your journal.</p>
            <input type="text" id="username-input" placeholder="Username" />
            <button class="main-button full-width" onclick="setUsername()">Continue</button>
        </div>
    </div>

    <header class="top-bar">
        <div class="insite-logo"> InSiteful Mind </div>
        <!-- Navigation buttons -->
        <nav class="wrap row">
            <a href="journal.html">
                <button class="main-button"> Journal </button>
            </a>
            <a href="check-in.html">
                <button class="main-button"> Check-In </button>
            </a>
            <a href="three-word-reflection.html">
                <button class="main-button"> Three-Word </button>
            </a>
            <a href="trends.html">
                <button class="main-button"> Trends </button>
            </a>
        </nav>
    </header>

    <main class="container container-top">
        <div class="journal-layout">
            <!-- New Entry Form -->
            <div class="entry-form panel">
                <h2>New Entry</h2>
                <input type="text" id="entry-title" placeholder="Title (optional)" />
                <textarea id="entry-content" placeholder="What's on your mind?"></textarea>
                <button class="main-button full-width" id="save-btn" onclick="saveEntry()">Save Entry</button>
            </div>

            <!-- Past Entries -->
            <div class="entries-panel panel">
                <h2>Past Entries</h2>
                <div class="search-bar-row">
                    <input type="text" id="search-input" placeholder="Search by keyword..." oninput="filterEntries()" />
                    <div class="date-filter-row">
                        <input type="date" id="date-from" onchange="filterEntries()" title="From date" />
                        <span class="date-sep">—</span>
                        <input type="date" id="date-to" onchange="filterEntries()" title="To date" />
                    </div>
                </div>
                <div class="entries-list" id="entries-list">
                    <p class="empty-state">Loading entries...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentUsername = localStorage.getItem('username');

        // Show or hide the username prompt
        if (currentUsername) {
            document.getElementById('username-overlay').style.display = 'none';
            loadEntries();
        }

        // Press Enter to submit username
        document.getElementById('username-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') setUsername();
        });

        // set the username in local storage and load the entries
        function setUsername() {
            const val = document.getElementById('username-input').value.trim();
            if (!val) return;
            currentUsername = val;
            localStorage.setItem('username', val);
            document.getElementById('username-overlay').style.display = 'none';
            loadEntries();
        }

        // returns the headers used in the API request
        function authHeaders() {
            return {
                'Content-Type': 'application/json',
                'X-Username': currentUsername,
            };
        }

        // formats the date in the format of month day, year hour:minute
        function formatDate(timestamp) {
            return new Date(timestamp).toLocaleDateString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: '2-digit', minute: '2-digit',
            });
        }

        // ensures the string is safe to display in the HTML
        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        let allEntries = [];

        // filters the entries based on the search input, from date, and to date
        function filterEntries() {
            const query = document.getElementById('search-input').value.trim().toLowerCase();
            const fromVal = document.getElementById('date-from').value;
            const toVal = document.getElementById('date-to').value;

            let filtered = allEntries;

            // filter by title or content
            if (query) {
                filtered = filtered.filter(e =>
                    e.title.toLowerCase().includes(query) ||
                    e.content.toLowerCase().includes(query)
                );
            }
            // filter by from date
            if (fromVal) {
                const from = new Date(fromVal).getTime();
                filtered = filtered.filter(e => e.timestamp >= from);
            }
            // filter by to date
            if (toVal) {
                const to = new Date(toVal + 'T23:59:59').getTime();
                filtered = filtered.filter(e => e.timestamp <= to);
            }
            // render the entries
            renderEntries(filtered, query);
        }

        // highlights the text in the entry that matches the search query
        function highlightText(str, query) {
            if (!query) return escapeHtml(str);
            const escaped = escapeHtml(str);
            const escapedQuery = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return escaped.replace(new RegExp(`(${escapedQuery})`, 'gi'), '<mark>$1</mark>');
        }

        // renders the entries in the list
        function renderEntries(entries, query = '') {
            const list = document.getElementById('entries-list');
            if (allEntries.length === 0) {
                list.innerHTML = '<p class="empty-state">No entries yet. Write your first one!</p>';
                return;
            }
            if (entries.length === 0) {
                list.innerHTML = '<p class="empty-state">No entries match your search.</p>';
                return;
            }
            // add the entries to the list as cards in HTML
            list.innerHTML = entries.map(entry => `
                <div class="entry-card" id="entry-${entry.id}">
                    <div class="entry-card-header">
                        <h3>${highlightText(entry.title, query)}</h3>
                        <div class="entry-meta">
                            <span class="entry-date">${formatDate(entry.timestamp)}</span>
                            <button class="delete-btn" onclick="deleteEntry('${entry.id}')" title="Delete">&#x2715;</button>
                        </div>
                    </div>
                    <p class="entry-content">${highlightText(entry.content, query)}</p>
                </div>
            `).join('');
        }

        // loads the entries from the API for the current user
        async function loadEntries() {
            try {
                const res = await fetch('/api/entries', { headers: authHeaders() });
                allEntries = await res.json();
                filterEntries();
            } catch {
                document.getElementById('entries-list').innerHTML =
                    '<p class="empty-state">Failed to load entries.</p>';
            }
        }

        // asks the API to save the entry
        async function saveEntry() {
            const title = document.getElementById('entry-title').value.trim();
            const content = document.getElementById('entry-content').value.trim();
            if (!content) return;

            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                const res = await fetch('/api/entries', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({ title, content }),
                });
                // if the entry is saved successfully, clear the input fields and reload the entries
                if (res.ok) {
                    document.getElementById('entry-title').value = '';
                    document.getElementById('entry-content').value = '';
                    await loadEntries();
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save Entry';
            }
        }

        // asks the API to delete the entry
        async function deleteEntry(id) {
            await fetch(`/api/entries/${id}`, { method: 'DELETE', headers: authHeaders() });
            allEntries = allEntries.filter(e => e.id !== id);
            filterEntries();
        }
    </script>
</body>

</html>
