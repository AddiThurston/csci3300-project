<!doctype html>
<!-- InSiteful Mind by Addison Thurston, David Pan, Kysen Krishnaswamy, and Prabhnoor Singh -->
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InSiteful Mind</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <!-- Username prompt -->
    <div class="username-overlay" id="username-overlay">
        <div class="username-card panel">
            <h2>Welcome</h2>
            <p>Enter a username to access your journal.</p>
            <input type="text" id="username-input" placeholder="Username" />
            <button class="main-button full-width" onclick="setUsername()">Continue</button>
        </div>
    </div>

    <header class="top-bar">
        <div class="insite-logo"> InSiteful Mind </div>
        <nav class="wrap row">
            <a href="journal.html">
                <button class="main-button"> Journal </button>
            </a>
            <a href="check-in.html">
                <button class="main-button"> Check-In </button>
            </a>
            <a href="three-word-reflection.html">
                <button class="main-button"> Three-Word </button>
            </a>
            <a href="trends.html">
                <button class="main-button"> Trends </button>
            </a>
        </nav>
    </header>

    <main class="container container-top">
        <div class="journal-layout">
            <!-- New Entry Form -->
            <div class="entry-form panel">
                <h2>New Entry</h2>
                <input type="text" id="entry-title" placeholder="Title (optional)" />
                <textarea id="entry-content" placeholder="What's on your mind?"></textarea>
                <button class="main-button full-width" id="save-btn" onclick="saveEntry()">Save Entry</button>
            </div>

            <!-- Past Entries -->
            <div class="entries-panel panel">
                <h2>Past Entries</h2>
                <div class="entries-list" id="entries-list">
                    <p class="empty-state">Loading entries...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        let currentUsername = localStorage.getItem('username');

        // Show or hide the username prompt
        if (currentUsername) {
            document.getElementById('username-overlay').style.display = 'none';
            loadEntries();
        }

        // Press Enter to submit username
        document.getElementById('username-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') setUsername();
        });

        function setUsername() {
            const val = document.getElementById('username-input').value.trim();
            if (!val) return;
            currentUsername = val;
            localStorage.setItem('username', val);
            document.getElementById('username-overlay').style.display = 'none';
            loadEntries();
        }

        function authHeaders() {
            return {
                'Content-Type': 'application/json',
                'X-Username': currentUsername,
            };
        }

        function formatDate(timestamp) {
            return new Date(timestamp).toLocaleDateString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: '2-digit', minute: '2-digit',
            });
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function renderEntries(entries) {
            const list = document.getElementById('entries-list');
            if (entries.length === 0) {
                list.innerHTML = '<p class="empty-state">No entries yet. Write your first one!</p>';
                return;
            }
            list.innerHTML = entries.map(entry => `
                <div class="entry-card" id="entry-${entry.id}">
                    <div class="entry-card-header">
                        <h3>${escapeHtml(entry.title)}</h3>
                        <div class="entry-meta">
                            <span class="entry-date">${formatDate(entry.timestamp)}</span>
                            <button class="delete-btn" onclick="deleteEntry('${entry.id}')" title="Delete">&#x2715;</button>
                        </div>
                    </div>
                    <p class="entry-content">${escapeHtml(entry.content)}</p>
                </div>
            `).join('');
        }

        async function loadEntries() {
            try {
                const res = await fetch('/api/entries', { headers: authHeaders() });
                const entries = await res.json();
                renderEntries(entries);
            } catch {
                document.getElementById('entries-list').innerHTML =
                    '<p class="empty-state">Failed to load entries.</p>';
            }
        }

        async function saveEntry() {
            const title = document.getElementById('entry-title').value.trim();
            const content = document.getElementById('entry-content').value.trim();
            if (!content) return;

            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                const res = await fetch('/api/entries', {
                    method: 'POST',
                    headers: authHeaders(),
                    body: JSON.stringify({ title, content }),
                });
                if (res.ok) {
                    document.getElementById('entry-title').value = '';
                    document.getElementById('entry-content').value = '';
                    await loadEntries();
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save Entry';
            }
        }

        async function deleteEntry(id) {
            await fetch(`/api/entries/${id}`, { method: 'DELETE', headers: authHeaders() });
            allEntries = allEntries.filter(e => e.id !== id);
            filterEntries();
        }

        // ── Questionnaire ──────────────────────────────────────────────────
        const QUESTIONS = [
            { id: 'mood',             label: 'How would you rate your overall mood today?' },
            { id: 'sleep',            label: 'How well have you been sleeping?' },
            { id: 'energy',           label: 'How is your energy level?' },
            { id: 'calm',             label: 'How calm and relaxed do you feel?' },
            { id: 'connection',       label: 'How connected do you feel to others?' },
            { id: 'motivation',       label: 'How motivated do you feel?' },
            { id: 'focus',            label: 'How well are you able to focus?' },
            { id: 'responsibilities', label: 'How well are you managing your daily responsibilities?' },
            { id: 'hope',             label: 'How hopeful do you feel about the future?' },
            { id: 'anxiety_free',     label: 'How free from worry or anxiety do you feel?' },
            { id: 'progress',         label: 'How satisfied are you with your recent progress?' },
            { id: 'physical',         label: 'How well are you taking care of your physical health?' },
            { id: 'grounded',         label: 'How present and grounded do you feel?' },
        ];

        const SCALE_LABELS = { 1: 'Very Low', 2: 'Low', 3: 'Moderate', 4: 'Good', 5: 'Great' };

        let qResponses = {};

        function renderQuestionnaire() {
            qResponses = {};
            const list = document.getElementById('q-questions-list');
            list.innerHTML = QUESTIONS.map((q, i) => `
                <div style="margin-bottom:24px;">
                    <p style="margin:0 0 10px;font-size:14px;font-weight:600;color:var(--text);">
                        ${i + 1}. ${q.label}
                    </p>
                    <div style="display:flex;gap:8px;">
                        ${[1,2,3,4,5].map(n => `
                            <button
                                id="q-btn-${q.id}-${n}"
                                onclick="window.selectResponse('${q.id}', ${n})"
                                style="flex:1;padding:10px 0;border-radius:10px;border:1.5px solid var(--line);
                                       background:var(--control-bg-soft);color:var(--muted);font-size:13px;
                                       font-weight:600;cursor:pointer;transition:all .15s;"
                                onmouseover="if(!this.dataset.selected)this.style.borderColor='var(--primary)'"
                                onmouseout="if(!this.dataset.selected)this.style.borderColor='var(--line)'"
                            >${n}<br><span style="font-size:10px;font-weight:400;">${SCALE_LABELS[n]}</span></button>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function selectResponse(questionId, value) {
            qResponses[questionId] = value;
            [1,2,3,4,5].forEach(n => {
                const btn = document.getElementById(`q-btn-${questionId}-${n}`);
                if (n === value) {
                    btn.style.background = 'linear-gradient(135deg,var(--primary),var(--primary-dark))';
                    btn.style.borderColor = 'var(--primary)';
                    btn.style.color = '#fff';
                    btn.dataset.selected = '1';
                } else {
                    btn.style.background = 'var(--control-bg-soft)';
                    btn.style.borderColor = 'var(--line)';
                    btn.style.color = 'var(--muted)';
                    delete btn.dataset.selected;
                }
            });
            document.getElementById('q-error').style.display = 'none';
        }

        function openQuestionnaire() {
            renderQuestionnaire();
            document.getElementById('q-error').style.display = 'none';
            const overlay = document.getElementById('questionnaire-overlay');
            overlay.style.display = 'flex';
            overlay.scrollTop = 0;
        }

        function dismissQuestionnaire() {
            document.getElementById('questionnaire-overlay').style.display = 'none';
        }

        async function submitQuestionnaire() {
            const unanswered = QUESTIONS.filter(q => !(q.id in qResponses));
            if (unanswered.length > 0) {
                document.getElementById('q-error').style.display = 'block';
                return;
            }
        }
    </script>
</body>

</html>
